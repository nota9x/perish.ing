<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Lowercase a in Bitter">
  <style>
    @font-face {
      font-family: 'Bitter Favicon';
      font-style: normal;
      font-weight: 100 900;
      src: url('/bitter-favicon.woff2') format('woff2');
    }

    text {
      fill: #161311;
      font-family: 'Bitter Favicon', 'Bitter Variable', Bitter, serif;
      font-size: 102px;
      font-variation-settings: 'wght' 760;
      text-anchor: middle;
      dominant-baseline: middle;
      text-rendering: geometricPrecision;
    }

    @media (prefers-color-scheme: dark) {
      text {
        fill: #e8ddd0;
      }
    }
  </style>
  <text x="50%" y="55%">a</text>
</svg>
